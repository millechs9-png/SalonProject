<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- Boxicons -->
	<link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
	<!-- My CSS -->
	<link rel="stylesheet" href="css/home.css">
	<link rel="stylesheet" href="css/mybookings.css">
	<title>My Bookings - CustomerHub</title>
	<script src="https://kit.fontawesome.com/7a6c6b42a6.js" crossorigin="anonymous"></script>
</head>
<body>

	<!-- SIDEBAR -->
	<section id="sidebar">
		<a href="home.html" class="brand">
			<i class='bx bxs-heart-circle'></i>
		</a>
		<ul class="side-menu top">
			<li>
				<a href="home.html">
					<i class='bx bxs-dashboard' ></i>
					<span class="text">Home</span>
				</a>
			</li>
			<li class="active">
				<a href="mybookings.html">
					<i class='bx bxs-calendar-check' ></i>
					<span class="text">My Bookings</span>
				</a>
			</li>
			<li>
				<a href="history.html">
					<i class='bx bxs-time-five' ></i>
					<span class="text">Booking History</span>
				</a>
			</li>
			<li>
				<a href="support.html">
					<i class='bx bxs-help-circle' ></i>
					<span class="text">Support</span>
				</a>
			</li>
			<li id="account-li">
				<a href="account.html" class="has-dropdown">
					<i class='bx bxs-user-circle' ></i>
					<span class="text">Account</span>
					<i class='bx bx-chevron-down dropdown-icon'></i>
				</a>
				<ul class="drop-menu">
					<li>
						<a href="account.html">
							<i class='bx bxs-user' ></i>
							<span class="text">Profile</span>
						</a>
					</li>
					<li>
						<a href="mybookings.html">
							<i class='bx bxs-calendar-check' ></i>
							<span class="text">My Bookings</span>
						</a>
					</li>
					<li>
						<a href="history.html">
							<i class='bx bxs-time-five' ></i>
							<span class="text">Booking History</span>
						</a>
					</li>
					<li>
						<a href="settings.html">
							<i class='bx bxs-cog' ></i>
							<span class="text">Settings</span>
						</a>
					</li>
				</ul>
			</li>
		</ul>
		<ul class="side-menu">
			<li>
				<a href="settings.html">
					<i class='bx bxs-cog' ></i>
					<span class="text">Settings</span>
				</a>
			</li>
			<li>
				<a href="../admin/logout.html" class="logout">
					<i class='bx bxs-log-out-circle' ></i>
					<span class="text">Logout</span>
				</a>
			</li>
		</ul>
	</section>
	<!-- SIDEBAR -->

	<!-- CONTENT -->
	<section id="content">
		<!-- NAVBAR -->
		<nav>
			<i class='bx bx-menu' ></i>
			<a href="#" class="nav-link">Bookings</a>
			<form action="#">
				<div class="form-input">
					<input type="search" placeholder="Search bookings...">
					<button type="submit" class="search-btn"><i class='bx bx-search' ></i></button>
				</div>
			</form>
			<input type="checkbox" id="switch-mode" hidden>
			<label for="switch-mode" class="switch-mode"></label>
			<a href="support.html" class="notification">
				<i class='bx bxs-bell' ></i>
				<span class="num">3</span>
			</a>
			<a href="profile.html" class="profile">
				<img src="img/profile-image.jpg">
			</a>
		</nav>

		<main>
			<div class="content-section" id="schedule">
                <div class="section-header">
                    <h2>My Schedule</h2>
                </div>
                <div class="schedule-content" id="scheduleContent">
                    <p>No upcoming appointments</p>
                    <a href="appointment.html" class="btn-book">Book an Appointment</a>
                </div>
            </div>
		</main>
	</section>
	<!-- CONTENT -->
	
	<script src="js/script.js"></script>
</body>
</html>
